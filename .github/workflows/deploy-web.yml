name: Deploy Web

on:
  # push 到 master 且 web/ 或 data/ 有变动时部署
  push:
    branches: [master]
    paths:
      - "web/**"
      - "data/**"
  # daily-digest 跑完后自动部署
  workflow_run:
    workflows: ["Daily Agents Radar"]
    types:
      - completed
  # 手动触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署
concurrency:
  group: "deploy-web"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 只在 daily-digest 成功时部署（workflow_run 触发时）
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web dependencies
        working-directory: web
        run: npm ci || npm install

      - name: Copy feed data to public
        run: |
          mkdir -p web/public/data
          if [ -f data/feed.json ]; then
            cp data/feed.json web/public/data/feed.json
            echo "Copied data/feed.json → web/public/data/feed.json"
          else
            echo "data/feed.json not found, using sample data"
          fi

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
