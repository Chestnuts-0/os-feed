# agents-radar configuration
# Edit this file to customize which repositories are tracked.
# Changes take effect on the next workflow run.

# ── AI CLI tools ──────────────────────────────────────────────────────────────
# Tracked for per-tool digests and cross-tool comparison.
# Each entry requires: id (filename slug), repo (owner/repo), name (display name).
# Set paginated: true for high-volume repos with many daily updates.

cli_repos:
  - id: claude-code
    repo: anthropics/claude-code
    name: Claude Code
  - id: codex
    repo: openai/codex
    name: OpenAI Codex
  - id: gemini-cli
    repo: google-gemini/gemini-cli
    name: Gemini CLI
  - id: copilot-cli
    repo: github/copilot-cli
    name: GitHub Copilot CLI
  - id: kimi-cli
    repo: MoonshotAI/kimi-cli
    name: Kimi Code CLI
  - id: opencode
    repo: anomalyco/opencode
    name: OpenCode
  - id: pi
    repo: badlogic/pi-mono
    name: Pi
  - id: qwen-code
    repo: QwenLM/qwen-code
    name: Qwen Code
  - id: deepseek-tui
    repo: Hmbown/DeepSeek-TUI
    name: DeepSeek TUI

# ── Claude Code Skills ────────────────────────────────────────────────────────
# Tracked separately without a date filter, sorted by community engagement.

skills_repo: anthropics/skills

# ── OpenClaw (primary focus project) ─────────────────────────────────────────
# Tracked with a dedicated deep-dive report. Set paginated: true for high-volume repos.

openclaw:
  id: openclaw
  repo: openclaw/openclaw
  name: OpenClaw
  paginated: true

# ── OpenClaw peer projects ────────────────────────────────────────────────────
# Tracked alongside OpenClaw for cross-ecosystem comparison.

openclaw_peers:
  - id: nanobot
    repo: HKUDS/nanobot
    name: NanoBot
    paginated: true
  - id: hermes-agent
    repo: nousresearch/hermes-agent
    name: Hermes Agent
  - id: picoclaw
    repo: sipeed/picoclaw
    name: PicoClaw
    paginated: true
  - id: nanoclaw
    repo: qwibitai/nanoclaw
    name: NanoClaw
  - id: nullclaw
    repo: nullclaw/nullclaw
    name: NullClaw
  - id: ironclaw
    repo: nearai/ironclaw
    name: IronClaw
  - id: lobsterai
    repo: netease-youdao/LobsterAI
    name: LobsterAI
  - id: tinyclaw
    repo: TinyAGI/tinyagi
    name: TinyClaw
  - id: moltis
    repo: moltis-org/moltis
    name: Moltis
  - id: copaw
    repo: agentscope-ai/CoPaw
    name: CoPaw
  - id: zeptoclaw
    repo: qhkm/zeptoclaw
    name: ZeptoClaw
  - id: zeroclaw
    repo: zeroclaw-labs/zeroclaw
    name: ZeroClaw

# ════════════════════════════════════════════════════════════════
# 开源版抖音信息流 — 扩展配置
# ════════════════════════════════════════════════════════════════

# ── 关注大牛清单 ───────────────────────────────────────────────
# 追踪这些 GitHub 用户 star 的项目（像关注博主一样）。
# 可在此列用户名，也可用环境变量 BIGBROS（逗号分隔）覆盖。
bigbros:
  - KKKKhazix

# ── Trending/Search 主题 ───────────────────────────────────────
# GitHub Search API 查询主题。覆盖 AI/工具/学习/好玩等多个领域。
trending_topics:
  # AI 核心
  - { q: "topic:llm", label: "llm" }
  - { q: "topic:ai-agent", label: "ai-agent" }
  - { q: "topic:rag", label: "rag" }
  - { q: "topic:vector-database", label: "vector-db" }
  - { q: "topic:machine-learning", label: "ml" }
  - { q: "topic:deep-learning", label: "deep-learning" }
  - { q: "topic:generative-ai", label: "gen-ai" }
  - { q: "topic:stable-diffusion", label: "stable-diffusion" }
  - { q: "topic:chatbot", label: "chatbot" }
  - { q: "topic:transformer", label: "transformer" }
  # 工具与开发
  - { q: "topic:cli", label: "cli" }
  - { q: "topic:developer-tools", label: "dev-tools" }
  - { q: "topic:self-hosted", label: "self-hosted" }
  - { q: "topic:automation", label: "automation" }
  - { q: "topic:productivity", label: "productivity" }
  # 学习资源
  - { q: "topic:awesome", label: "awesome" }
  - { q: "topic:tutorial", label: "tutorial" }
  - { q: "topic:interview", label: "interview" }
  # 好玩有趣
  - { q: "topic:game", label: "game" }
  - { q: "topic:emulator", label: "emulator" }

# ── star 门槛 ──────────────────────────────────────────────────
# 总 star 数低于此值的项目不进信息流
star_threshold: 50

# ── 兴趣画像 ───────────────────────────────────────────────────
# ai_interests_text 是给 AI 的自然语言兴趣描述（TrendRadar 式），
# AI 据此给每条项目打分。三个权重用于推荐排序。
interests:
  ai: 0.5
  fun: 0.3
  practical: 0.2
  ai_interests_text: "我想看 AI 相关、好玩的、能直接拿来用的开源工具和软件"
